<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Weather</h1>
        <p class="date" id="currentDate"></p>
    </div>

    <div class="search-box">
        <div class="search-input-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="cityInput" placeholder="Search city..." onkeypress="handleKeyPress(event)">
        </div>
        <button onclick="getWeather()" class="search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <span>Searching...</span>
    </div>
    <div id="errorMsg" class="error-message" style="display: none;"></div>

    <div class="weather-card" id="weatherCard">
        <div class="weather-main">
            <div class="weather-left">
                <p id="temperature" class="temperature"></p>
                <p id="description" class="description"></p>
            </div>
            <div class="weather-right">
                <img id="weatherIcon" class="weather-icon" src="" alt="">
            </div>
        </div>
        
        <div class="location-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
            <h2 id="cityName"></h2>
        </div>
        
        <p class="updated" id="lastUpdated"></p>
        
        <div class="weather-details">
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
                <div class="detail-info">
                    <span class="label">Humidity</span>
                    <span class="value" id="humidity">--</span>
                </div>
            </div>
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/>
                    <path d="M9.6 4.6A2 2 0 1 1 11 8H2"/>
                    <path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
                </svg>
                <div class="detail-info">
                    <span class="label">Wind</span>
                    <span class="value" id="wind">--</span>
                </div>
            </div>
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/>
                </svg>
                <div class="detail-info">
                    <span class="label">Feels like</span>
                    <span class="value" id="feelsLike">--</span>
                </div>
            </div>
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2"/>
                    <path d="M12 20v2"/>
                    <path d="m4.93 4.93 1.41 1.41"/>
                    <path d="m17.66 17.66 1.41 1.41"/>
                    <path d="M2 12h2"/>
                    <path d="M20 12h2"/>
                    <path d="m6.34 17.66-1.41 1.41"/>
                    <path d="m19.07 4.93-1.41 1.41"/>
                </svg>
                <div class="detail-info">
                    <span class="label">UV Index</span>
                    <span class="value" id="uvIndex">--</span>
                </div>
            </div>
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
                </svg>
                <div class="detail-info">
                    <span class="label">Pressure</span>
                    <span class="value" id="pressure">--</span>
                </div>
            </div>
            <div class="detail-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <div class="detail-info">
                    <span class="label">Visibility</span>
                    <span class="value" id="visibility">--</span>
                </div>
            </div>
        </div>
    </div>
    
    <p class="footer">Powered by WeatherAPI</p>
</div>

<script src="script.js"></script>
</body>
</html>
